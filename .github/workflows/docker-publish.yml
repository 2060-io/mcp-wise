name: Build and Publish Docker Image

on:
  push:
    branches: [main]
  workflow_call:
    inputs:
      release_version:
        description: "Release version (e.g., 1.2.3)"
        required: true
        type: string

env:
  IMAGE_NAME: io2060/mcp-wise

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_LOGIN }}
          password: ${{ secrets.DOCKER_HUB_PWD }}

      - name: Determine tags
        id: tags
        run: |
          if [ -n "${{ inputs.release_version }}" ]; then
            # Called from release workflow — tag as latest + version
            VERSION="${{ inputs.release_version }}"
            echo "tags=${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:${VERSION}" >> "$GITHUB_OUTPUT"
          else
            # Push to main — dev tag
            echo "tags=${{ env.IMAGE_NAME }}:dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}